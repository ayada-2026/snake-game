<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#d8eabc">
  <title>Snake 게임</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="game-shell">
    <section class="hero-card">
      <div class="hero-copy">
        <p class="eyebrow">Classic Arcade</p>
        <h1>Snake</h1>
        <p class="subtitle">
          먹이를 먹을수록 길어집니다. 벽이나 자기 몸에 닿으면 종료됩니다.
        </p>
      </div>

      <div class="hero-actions">
        <button type="button" class="ghost-button" id="pauseButton">일시정지</button>
        <button type="button" class="reset-button" id="restartButton">다시 시작</button>
      </div>
    </section>

    <section class="play-layout">
      <section class="board-card">
        <div class="status-row">
          <article class="status-card">
            <span class="status-label">SCORE</span>
            <strong class="status-value" id="scoreText">0</strong>
          </article>
          <article class="status-card">
            <span class="status-label">LENGTH</span>
            <strong class="status-value" id="lengthText">3</strong>
          </article>
          <article class="status-card status-card-wide">
            <span class="status-label">STATE</span>
            <strong class="status-value status-copy" id="statusText">진행 중</strong>
          </article>
        </div>

        <div class="board-frame" id="boardFrame">
          <div class="board" id="gameBoard" aria-label="Snake 게임 보드" role="grid"></div>

          <div class="overlay hidden" id="overlay" aria-live="polite">
            <div class="overlay-card">
              <p class="overlay-eyebrow" id="overlayEyebrow">게임 종료</p>
              <h2 id="overlayTitle">다시 시작해 보세요</h2>
              <p class="overlay-copy" id="overlayCopy">먹이를 모으며 점수를 더 높일 수 있습니다.</p>
              <button type="button" class="reset-button overlay-button" id="overlayRestartButton">한 판 더 하기</button>
            </div>
          </div>
        </div>
      </section>

      <aside class="control-card">
        <div class="control-header">
          <h2>조작</h2>
          <p class="control-note">방향키 / WASD / Space</p>
        </div>

        <div class="control-copy">
          <p>방향키 또는 <strong>WASD</strong>로 머리를 움직입니다.</p>
          <p><strong>Space</strong> 또는 <strong>P</strong>로 일시정지할 수 있습니다.</p>
          <p>모바일에서는 아래 버튼으로 방향을 바꿀 수 있습니다.</p>
        </div>

        <div class="dpad" aria-label="방향 버튼">
          <button type="button" class="dpad-button dpad-up" data-direction="up" aria-label="위로 이동">▲</button>
          <div class="dpad-row">
            <button type="button" class="dpad-button" data-direction="left" aria-label="왼쪽으로 이동">◀</button>
            <button type="button" class="dpad-button" data-direction="down" aria-label="아래로 이동">▼</button>
            <button type="button" class="dpad-button" data-direction="right" aria-label="오른쪽으로 이동">▶</button>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script src="./script.js" defer></script>
</body>
</html>
